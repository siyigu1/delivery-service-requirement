<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>团购每周流程 -- 交互式需求文档</title>
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
  :root {
    --admin: #2563eb;
    --admin-bg: #eff6ff;
    --admin-border: #bfdbfe;
    --admin-hover: #dbeafe;
    --user: #059669;
    --user-bg: #ecfdf5;
    --user-border: #a7f3d0;
    --user-hover: #d1fae5;
    --volunteer: #d97706;
    --volunteer-bg: #fffbeb;
    --volunteer-border: #fde68a;
    --volunteer-hover: #fef3c7;
    --supplier: #7c3aed;
    --supplier-bg: #f5f3ff;
    --supplier-border: #ddd6fe;
    --supplier-hover: #ede9fe;
    --line: #cbd5e1;
    --bg: #f8fafc;
    --text: #1e293b;
    --text-muted: #64748b;
    --card-shadow: 0 1px 3px rgba(0,0,0,0.06);
    --panel-width: 520px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 40px 20px;
    transition: padding-right 0.3s;
  }

  body.panel-open {
    padding-right: calc(var(--panel-width) + 20px);
  }

  .container {
    max-width: 1400px;
    margin: 0 auto;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }

  h1 { font-size: 28px; font-weight: 700; }

  .header-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  .btn {
    padding: 6px 14px;
    border-radius: 8px;
    border: 1.5px solid var(--line);
    background: white;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.15s;
    color: var(--text);
  }

  .btn:hover { background: #f1f5f9; border-color: #94a3b8; }
  .btn.primary { background: var(--admin); color: white; border-color: var(--admin); }
  .btn.primary:hover { background: #1d4ed8; }
  .btn.danger { color: #dc2626; border-color: #fca5a5; }
  .btn.danger:hover { background: #fef2f2; }

  .subtitle {
    text-align: center;
    color: var(--text-muted);
    font-size: 15px;
    margin-bottom: 32px;
  }

  /* Sync status */
  .sync-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-muted);
    padding: 4px 10px;
    border-radius: 6px;
    background: #f1f5f9;
  }

  .sync-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #94a3b8;
  }

  .sync-dot.connected { background: #22c55e; }
  .sync-dot.syncing { background: #f59e0b; animation: pulse 1s infinite; }

  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* Legend */
  .legend {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-bottom: 36px;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 500;
  }

  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
  }

  /* Timeline grid */
  .timeline {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 0;
    position: relative;
  }

  /* Day headers */
  .day-header {
    text-align: center;
    padding: 12px 8px;
  }

  .day-label {
    font-size: 13px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .day-name { font-size: 20px; font-weight: 700; }

  /* Connector */
  .connector-row {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    position: relative;
    height: 40px;
    align-items: center;
  }

  .connector-row::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 5%;
    right: 5%;
    height: 3px;
    background: linear-gradient(90deg, var(--line), var(--admin), var(--user), var(--volunteer), var(--line));
    border-radius: 2px;
    transform: translateY(-50%);
  }

  .connector-dot {
    width: 14px;
    height: 14px;
    background: white;
    border: 3px solid var(--admin);
    border-radius: 50%;
    margin: 0 auto;
    position: relative;
    z-index: 2;
  }

  .connector-dot:nth-child(1) { border-color: var(--line); background: var(--bg); }
  .connector-dot:nth-child(6) { border-color: var(--volunteer); }
  .connector-dot:nth-child(7) { border-color: var(--line); background: var(--bg); }

  /* Activity columns */
  .activities-row {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 12px;
    padding: 0 8px;
    margin-top: 8px;
  }

  .day-column {
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-height: 40px;
    border-radius: 12px;
    padding: 4px;
    transition: background 0.2s;
  }

  .day-column.drag-over {
    background: rgba(37, 99, 235, 0.06);
    outline: 2px dashed var(--admin-border);
    outline-offset: -2px;
  }

  /* Activity cards */
  .activity {
    border-radius: 12px;
    padding: 14px;
    position: relative;
    border: 1.5px solid;
    transition: transform 0.15s, box-shadow 0.15s;
    cursor: pointer;
    user-select: none;
  }

  .activity:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  }

  .activity.selected {
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.3), 0 4px 16px rgba(0,0,0,0.1);
    transform: translateY(-2px);
  }

  .activity.dragging { opacity: 0.15; transform: scale(0.95); height: 0; padding: 0; margin: 0; overflow: hidden; border: none; }

  .activity.admin { background: var(--admin-bg); border-color: var(--admin-border); }
  .activity.user { background: var(--user-bg); border-color: var(--user-border); }
  .activity.volunteer { background: var(--volunteer-bg); border-color: var(--volunteer-border); }
  .activity.supplier { background: var(--supplier-bg); border-color: var(--supplier-border); }

  /* Drop placeholder */
  .drop-placeholder {
    border: 2px dashed var(--admin);
    border-radius: 12px;
    background: rgba(37, 99, 235, 0.05);
    transition: height 0.2s ease;
    min-height: 20px;
  }

  .activity-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 4px;
    line-height: 1.3;
  }

  .admin .activity-title { color: var(--admin); }
  .user .activity-title { color: var(--user); }
  .volunteer .activity-title { color: var(--volunteer); }
  .supplier .activity-title { color: var(--supplier); }

  .activity-desc {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  .activity-role {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 2px 8px;
    border-radius: 4px;
    margin-top: 8px;
  }

  .admin .activity-role { background: var(--admin); color: white; }
  .user .activity-role { background: var(--user); color: white; }
  .volunteer .activity-role { background: var(--volunteer); color: white; }
  .supplier .activity-role { background: var(--supplier); color: white; }

  .drag-handle {
    position: absolute;
    top: 8px;
    right: 8px;
    color: var(--line);
    font-size: 14px;
    cursor: grab;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .activity:hover .drag-handle { opacity: 1; }

  .card-badges {
    display: flex;
    gap: 4px;
    margin-top: 8px;
    flex-wrap: wrap;
  }

  .card-badge {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 4px;
    background: rgba(0,0,0,0.06);
    color: var(--text-muted);
  }

  .card-badge.pain { background: #fee2e2; color: #dc2626; }
  .card-badge.open { background: #fef3c7; color: #b45309; }

  .arrow-down {
    text-align: center;
    color: var(--line);
    font-size: 18px;
    line-height: 1;
    margin: -4px 0;
    pointer-events: none;
  }

  /* Span bars */
  .span-bar {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 12px;
    padding: 0 8px;
    margin-top: 12px;
  }

  .span-label {
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    font-weight: 500;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  /* Phase dividers */
  .phase-row {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 24px 0 12px;
    padding: 0 8px;
  }

  .phase-line { flex: 1; height: 1px; background: var(--line); }

  .phase-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    white-space: nowrap;
  }

  /* Add step button */
  .add-step-btn {
    width: 100%;
    padding: 6px 0;
    border: 1.5px dashed var(--line);
    border-radius: 8px;
    background: transparent;
    cursor: pointer;
    font-size: 12px;
    color: var(--text-muted);
    transition: all 0.15s;
    margin-top: 4px;
  }

  .add-step-btn:hover {
    border-color: var(--admin);
    color: var(--admin);
    background: var(--admin-bg);
  }

  /* ======================== */
  /* Non-Weekly Tasks Section  */
  /* ======================== */
  .non-weekly-section {
    margin-top: 48px;
  }

  .non-weekly-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .non-weekly-title {
    font-size: 20px;
    font-weight: 700;
  }

  .non-weekly-grid {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }

  .nw-card {
    border-radius: 12px;
    padding: 16px;
    border: 1.5px solid;
    cursor: pointer;
    user-select: none;
    min-width: 200px;
    max-width: 280px;
    flex: 1;
    transition: transform 0.15s, box-shadow 0.15s;
  }

  .nw-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  }

  .nw-card.selected {
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.3), 0 4px 16px rgba(0,0,0,0.1);
    transform: translateY(-2px);
  }

  .nw-card.admin { background: var(--admin-bg); border-color: var(--admin-border); }
  .nw-card.user { background: var(--user-bg); border-color: var(--user-border); }
  .nw-card.volunteer { background: var(--volunteer-bg); border-color: var(--volunteer-border); }
  .nw-card.supplier { background: var(--supplier-bg); border-color: var(--supplier-border); }


  .nw-card-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .nw-card.admin .nw-card-title { color: var(--admin); }
  .nw-card.user .nw-card-title { color: var(--user); }
  .nw-card.volunteer .nw-card-title { color: var(--volunteer); }
  .nw-card.supplier .nw-card-title { color: var(--supplier); }

  .nw-card-desc {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
    margin-bottom: 8px;
  }

  .cadence-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
    background: rgba(0,0,0,0.06);
    color: var(--text-muted);
  }

  .nw-card-role {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 2px 8px;
    border-radius: 4px;
    margin-left: 4px;
  }

  .nw-card.admin .nw-card-role { background: var(--admin); color: white; }
  .nw-card.user .nw-card-role { background: var(--user); color: white; }
  .nw-card.volunteer .nw-card-role { background: var(--volunteer); color: white; }
  .nw-card.supplier .nw-card-role { background: var(--supplier); color: white; }

  .add-nw-card {
    border-radius: 12px;
    padding: 16px;
    border: 1.5px dashed var(--line);
    cursor: pointer;
    min-width: 200px;
    max-width: 280px;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    font-size: 13px;
    transition: all 0.15s;
  }

  .add-nw-card:hover {
    border-color: var(--admin);
    color: var(--admin);
    background: var(--admin-bg);
  }

  /* ======================== */
  /* Side Panel               */
  /* ======================== */
  .side-panel {
    position: fixed;
    top: 0;
    right: 0;
    width: var(--panel-width);
    height: 100vh;
    background: white;
    box-shadow: -4px 0 24px rgba(0,0,0,0.1);
    transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 100;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .side-panel.open { transform: translateX(0); }

  .panel-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid #e2e8f0;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    flex-shrink: 0;
  }

  .panel-header-icon {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 700;
    color: white;
    flex-shrink: 0;
  }

  .panel-header-icon.admin { background: var(--admin); }
  .panel-header-icon.user { background: var(--user); }
  .panel-header-icon.volunteer { background: var(--volunteer); }
  .panel-header-icon.supplier { background: var(--supplier); }

  .panel-header-text { flex: 1; }

  .panel-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .panel-subtitle {
    font-size: 13px;
    color: var(--text-muted);
  }

  .panel-close {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    border: none;
    background: #f1f5f9;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
  }

  .panel-close:hover { background: #e2e8f0; }

  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
  }

  .panel-section { margin-bottom: 24px; }

  .panel-section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .panel-section-title {
    font-size: 14px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-tag {
    display: inline-block;
    font-size: 12px;
    font-weight: 600;
    padding: 1px 6px;
    border-radius: 4px;
    background: #e2e8f0;
    color: var(--text-muted);
  }

  .section-tag.known { background: #dbeafe; color: #2563eb; }
  .section-tag.pain { background: #fee2e2; color: #dc2626; }
  .section-tag.keep { background: #dcfce7; color: #16a34a; }
  .section-tag.question { background: #fef3c7; color: #b45309; }

  .add-btn {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 6px;
    border: 1.5px dashed var(--line);
    background: white;
    cursor: pointer;
    color: var(--text-muted);
    transition: all 0.15s;
  }

  .add-btn:hover {
    border-color: var(--admin);
    color: var(--admin);
    background: var(--admin-bg);
  }

  .editable-area {
    width: 100%;
    min-height: 60px;
    padding: 10px 12px;
    border: 1.5px solid #e2e8f0;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.6;
    font-family: inherit;
    color: var(--text);
    resize: vertical;
    transition: border-color 0.15s;
    background: #fafbfc;
  }

  .editable-area:focus {
    outline: none;
    border-color: var(--admin);
    background: white;
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
  }

  .editable-area::placeholder { color: #94a3b8; }

  .item-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .item-row {
    display: flex;
    gap: 8px;
    align-items: flex-start;
    padding: 10px 12px;
    border-radius: 8px;
    background: #fafbfc;
    border: 1.5px solid #e2e8f0;
    transition: border-color 0.15s;
  }

  .item-row:focus-within { border-color: var(--admin); background: white; }
  .item-row.pain { background: #fef2f2; border-color: #fecaca; }
  .item-row.keep { background: #f0fdf4; border-color: #bbf7d0; }

  .item-priority {
    flex-shrink: 0;
    width: 36px;
    padding: 4px;
    border: 1px solid #e2e8f0;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 600;
    text-align: center;
    background: white;
    cursor: pointer;
  }

  .item-priority.p0, .item-priority.P0 { color: #dc2626; border-color: #fca5a5; }
  .item-priority.p1, .item-priority.P1 { color: #d97706; border-color: #fde68a; }
  .item-priority.p2, .item-priority.P2 { color: #2563eb; border-color: #bfdbfe; }
  .item-priority.p3, .item-priority.P3 { color: #64748b; border-color: #e2e8f0; }

  .item-text {
    flex: 1;
    border: none;
    background: transparent;
    font-size: 13px;
    font-family: inherit;
    color: var(--text);
    line-height: 1.5;
    resize: none;
    min-height: 20px;
  }

  .item-text:focus { outline: none; }

  .item-delete {
    flex-shrink: 0;
    width: 24px;
    height: 24px;
    border: none;
    background: transparent;
    cursor: pointer;
    color: #cbd5e1;
    font-size: 14px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    opacity: 0;
  }

  .item-row:hover .item-delete { opacity: 1; }
  .item-delete:hover { color: #dc2626; background: #fee2e2; }

  .question-row {
    display: flex;
    gap: 8px;
    align-items: flex-start;
    padding: 8px 12px;
    border-radius: 8px;
    background: #fffbeb;
    border: 1.5px solid #fde68a;
  }

  .question-row input[type="checkbox"] {
    margin-top: 3px;
    flex-shrink: 0;
    width: 16px;
    height: 16px;
    cursor: pointer;
  }

  .question-row.resolved {
    background: #f0fdf4;
    border-color: #bbf7d0;
    text-decoration: line-through;
    opacity: 0.6;
  }

  .panel-footer {
    padding: 16px 24px;
    border-top: 1px solid #e2e8f0;
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }

  /* Overlay */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.15);
    z-index: 50;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .overlay.show { opacity: 1; pointer-events: auto; }

  .footer-note {
    text-align: center;
    margin-top: 40px;
    font-size: 13px;
    color: var(--text-muted);
    font-style: italic;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text);
    color: white;
    padding: 10px 20px;
    border-radius: 10px;
    font-size: 13px;
    z-index: 200;
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    pointer-events: none;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Loading overlay */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 300;
    gap: 16px;
    transition: opacity 0.3s;
  }

  .loading-overlay.hidden { opacity: 0; pointer-events: none; }

  .loading-spinner {
    width: 40px;
    height: 40px;
    border: 4px solid #e2e8f0;
    border-top-color: var(--admin);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- Loading -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>

const DAY_LABELS = [
  { en: "Monday", zh: "周一" },
  { en: "Tuesday", zh: "周二" },
  { en: "Wednesday", zh: "周三" },
  { en: "Thursday", zh: "周四" },
  { en: "Friday", zh: "周五" },
  { en: "Saturday", zh: "周六" },
  { en: "Sunday", zh: "周日" }
];

let data = null;
let selectedCardId = null;
let dragSourceInfo = null;
let saveTimeout = null;
let isInitialLoad = true;

// ============================
// FIREBASE SYNC
// ============================
function initFirebase() {
  // Listen for data changes (real-time sync)
  dataRef.on('value', (snapshot) => {
    const val = snapshot.val();
    if (val) {
      data = val;
    } else {
      // First time -- seed with default data
      data = JSON.parse(JSON.stringify(DEFAULT_DATA));
      dataRef.set(data);
    }

    render();
    renderNonWeekly();

    // Re-render panel if open
    if (selectedCardId) {
      const card = findCard(selectedCardId) || findNonWeeklyCard(selectedCardId);
      if (card) renderPanelBody(card);
    }

    if (isInitialLoad) {
      isInitialLoad = false;
      document.getElementById('loadingOverlay').classList.add('hidden');
    }

    setSyncStatus('connected');
  }, (error) => {
    console.error('Firebase error:', error);
    setSyncStatus('error');
    // Fallback to localStorage
    const saved = localStorage.getItem('tuangou_flow_backup');
    if (saved && !data) {
      data = JSON.parse(saved);
      render();
      renderNonWeekly();
      document.getElementById('loadingOverlay').classList.add('hidden');
    }
  });

  // Connection state
  db.ref('.info/connected').on('value', (snap) => {
    setSyncStatus(snap.val() ? 'connected' : 'disconnected');
  });
}

function setSyncStatus(status) {
  const dot = document.getElementById('syncDot');
  const text = document.getElementById('syncText');
  dot.className = 'sync-dot';
  switch (status) {
    case 'connected':
      dot.classList.add('connected');
      text.textContent = '已同步';
      break;
    case 'syncing':
      dot.classList.add('syncing');
      text.textContent = '同步中...';
      break;
    case 'disconnected':
      text.textContent = '离线';
      break;
    case 'error':
      text.textContent = '连接失败';
      break;
  }
}

function save() {
  // Debounce writes to Firebase
  if (saveTimeout) clearTimeout(saveTimeout);
  setSyncStatus('syncing');
  saveTimeout = setTimeout(() => {
    dataRef.set(data).then(() => {
      setSyncStatus('connected');
    }).catch((err) => {
      console.error('Save error:', err);
      setSyncStatus('error');
    });
    // Also backup to localStorage
    localStorage.setItem('tuangou_flow_backup', JSON.stringify(data));
  }, 500);
}

// ============================
// RENDER
// ============================
function render() {
  if (!data) return;
  const tl = document.getElementById("timeline");
  let html = "";

  DAY_LABELS.forEach(d => {
    html += '<div class="day-header"><div class="day-label">' + d.en + '</div><div class="day-name">' + d.zh + '</div></div>';
  });

  html += '<div class="connector-row">';
  for (let i = 0; i < 7; i++) html += '<div class="connector-dot"></div>';
  html += '</div>';

  data.phases.forEach(phase => {
    html += '<div class="phase-row"><div class="phase-line"></div><div class="phase-label">' + phase.label + '</div><div class="phase-line"></div></div>';

    phase.rows.forEach((row, rowIdx) => {
      html += '<div class="activities-row">';
      // Ensure we always have 7 columns
      for (let colIdx = 0; colIdx < 7; colIdx++) {
        var cards = (row.columns && row.columns[colIdx]) ? row.columns[colIdx] : [];
        html += '<div class="day-column" data-phase="' + phase.id + '" data-row="' + rowIdx + '" data-col="' + colIdx + '"'
              + ' ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">';
        if (cards && cards.length > 0) {
          cards.forEach((card, cardIdx) => {
            var isSelected = selectedCardId === card.id;
            var painCount = card.details && card.details.pains ? card.details.pains.length : 0;
            var qCount = card.details && card.details.questions ? card.details.questions.filter(function(q) { return !q.resolved; }).length : 0;
            var borderStyle = card.style === 'dashed' ? 'border-style:dashed;opacity:0.8;' : '';

            html += '<div class="activity ' + card.role + (isSelected ? ' selected' : '') + '" style="' + borderStyle + '"'
                  + ' draggable="true" data-card-id="' + card.id + '"'
                  + ' onclick="openPanel(\'' + card.id + '\')"'
                  + ' ondragstart="onDragStart(event, \'' + phase.id + '\', ' + rowIdx + ', ' + colIdx + ', ' + cardIdx + ')"'
                  + ' ondragend="onDragEnd(event)">'
                  + '<div class="drag-handle">///</div>'
                  + '<div class="activity-title">' + card.title + '</div>'
                  + '<div class="activity-desc">' + card.desc + '</div>'
                  + '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">'
                  + '<div class="activity-role">' + card.roleLabel + '</div>';
            if (painCount > 0) html += '<span class="card-badge pain">' + painCount + ' 痛点</span>';
            if (qCount > 0) html += '<span class="card-badge open">' + qCount + ' 待确认</span>';
            html += '</div></div>';
            if (cardIdx < cards.length - 1) html += '<div class="arrow-down">V</div>';
          });
        }
        html += '<button class="add-step-btn" onclick="addStep(\'' + phase.id + '\', ' + rowIdx + ', ' + colIdx + ')">+ 添加</button>';
        html += '</div>';
      }
      html += '</div>';
    });

    if (phase.spanBars && phase.spanBars.length > 0) {
      html += '<div class="span-bar">';
      var col = 1;
      phase.spanBars.forEach(function(bar) {
        while (col < bar.startCol) { html += '<div></div>'; col++; }
        html += '<div class="span-label" style="grid-column:' + bar.startCol + '/' + bar.endCol + ';background:var(--' + bar.colorType + '-bg);border:1.5px solid var(--' + bar.colorType + '-border);color:var(--' + bar.colorType + ');">'
              + bar.text
              + '</div>';
        col = bar.endCol;
      });
      while (col <= 7) { html += '<div></div>'; col++; }
      html += '</div>';
    }
  });

  tl.innerHTML = html;
}

// ============================
// NON-WEEKLY TASKS RENDER
// ============================
function renderNonWeekly() {
  if (!data) return;
  var section = document.getElementById("nonWeeklySection");
  var tasks = data.nonWeeklyTasks || [];

  var html = '<div class="non-weekly-header">'
           + '<h2 class="non-weekly-title">非周期性流程</h2>'
           + '</div>'
           + '<div class="non-weekly-grid">';

  tasks.forEach(function(task) {
    var isSelected = selectedCardId === task.id;
    html += '<div class="nw-card ' + task.role + (isSelected ? ' selected' : '') + '" onclick="openPanel(\'' + task.id + '\')">'
          + '<div class="nw-card-title">' + task.title + '</div>'
          + '<div class="nw-card-desc">' + task.desc + '</div>'
          + '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">'
          + '<span class="cadence-badge">' + task.cadence + '</span>'
          + '<span class="nw-card-role">' + task.roleLabel + '</span>'
          + '</div>'
          + '</div>';
  });

  html += '<div class="add-nw-card" onclick="addNonWeeklyTask()">+ 添加</div>';
  html += '</div>';

  section.innerHTML = html;
}

// ============================
// PANEL
// ============================
function openPanel(cardId) {
  var card = findCard(cardId) || findNonWeeklyCard(cardId);
  if (!card) return;
  selectedCardId = cardId;
  render();
  renderNonWeekly();

  var iconEl = document.getElementById("panelIcon");
  iconEl.textContent = card.icon || card.title.charAt(0);
  iconEl.className = 'panel-header-icon ' + card.role;

  document.getElementById("panelTitle").textContent = card.title;
  document.getElementById("panelSubtitle").textContent = card.desc;
  renderPanelBody(card);
  document.getElementById("sidePanel").classList.add("open");
  document.getElementById("overlay").classList.add("show");
  document.body.classList.add("panel-open");
}

function closePanel() {
  document.getElementById("sidePanel").classList.remove("open");
  document.getElementById("overlay").classList.remove("show");
  document.body.classList.remove("panel-open");
  selectedCardId = null;
  render();
  renderNonWeekly();
}

function renderPanelBody(card) {
  var body = document.getElementById("panelBody");
  var d = card.details || { known: "", pains: [], keeps: [], questions: [] };
  var html = "";

  html += '<div class="panel-section">'
       + '<div class="panel-section-header">'
       + '<div class="panel-section-title"><span class="section-tag known">[已知]</span> 已知信息</div>'
       + '</div>'
       + '<textarea class="editable-area" rows="6" placeholder="记录已知的流程和规则..."'
       + ' oninput="updateKnown(\'' + card.id + '\', this.value)">' + (d.known || '') + '</textarea>'
       + '</div>';

  html += '<div class="panel-section">'
       + '<div class="panel-section-header">'
       + '<div class="panel-section-title"><span class="section-tag pain">[痛点]</span> 当前痛点</div>'
       + '<button class="add-btn" onclick="addItem(\'' + card.id + '\', \'pains\')">+ 添加痛点</button>'
       + '</div>'
       + '<div class="item-list" id="pains-' + card.id + '">';
  (d.pains || []).forEach(function(item, idx) {
    html += renderItemRow(card.id, 'pains', idx, item, 'pain');
  });
  if (!d.pains || d.pains.length === 0) html += '<div style="font-size:13px;color:var(--text-muted);padding:8px 0;">暂无痛点记录</div>';
  html += '</div></div>';

  html += '<div class="panel-section">'
       + '<div class="panel-section-header">'
       + '<div class="panel-section-title"><span class="section-tag keep">[保留]</span> 希望保留</div>'
       + '<button class="add-btn" onclick="addItem(\'' + card.id + '\', \'keeps\')">+ 添加</button>'
       + '</div>'
       + '<div class="item-list" id="keeps-' + card.id + '">';
  (d.keeps || []).forEach(function(item, idx) {
    html += renderItemRow(card.id, 'keeps', idx, item, 'keep');
  });
  if (!d.keeps || d.keeps.length === 0) html += '<div style="font-size:13px;color:var(--text-muted);padding:8px 0;">暂无记录</div>';
  html += '</div></div>';

  html += '<div class="panel-section">'
       + '<div class="panel-section-header">'
       + '<div class="panel-section-title"><span class="section-tag question">[问题]</span> 待确认问题</div>'
       + '<button class="add-btn" onclick="addQuestion(\'' + card.id + '\')">+ 添加问题</button>'
       + '</div>'
       + '<div class="item-list" id="questions-' + card.id + '">';
  (d.questions || []).forEach(function(q, idx) {
    html += '<div class="question-row ' + (q.resolved ? 'resolved' : '') + '">'
         + '<input type="checkbox" ' + (q.resolved ? 'checked' : '') + ' onchange="toggleQuestion(\'' + card.id + '\', ' + idx + ', this.checked)">'
         + '<textarea class="item-text" oninput="updateQuestion(\'' + card.id + '\', ' + idx + ', this.value)">' + q.text + '</textarea>'
         + '<button class="item-delete" onclick="deleteQuestion(\'' + card.id + '\', ' + idx + ')">X</button>'
         + '</div>';
  });
  if (!d.questions || d.questions.length === 0) html += '<div style="font-size:13px;color:var(--text-muted);padding:8px 0;">暂无待确认问题</div>';
  html += '</div></div>';

  body.innerHTML = html;
  body.querySelectorAll('.item-text').forEach(autoResize);
  body.querySelectorAll('.editable-area').forEach(autoResize);
}

function renderItemRow(cardId, listType, idx, item, rowClass) {
  var p = item.priority || 'P1';
  return '<div class="item-row ' + rowClass + '">'
       + '<select class="item-priority ' + p + '" onchange="updateItemPriority(\'' + cardId + '\', \'' + listType + '\', ' + idx + ', this.value); this.className=\'item-priority \'+this.value;">'
       + '<option ' + (p === 'P0' ? 'selected' : '') + '>P0</option>'
       + '<option ' + (p === 'P1' ? 'selected' : '') + '>P1</option>'
       + '<option ' + (p === 'P2' ? 'selected' : '') + '>P2</option>'
       + '<option ' + (p === 'P3' ? 'selected' : '') + '>P3</option>'
       + '</select>'
       + '<textarea class="item-text" oninput="updateItemText(\'' + cardId + '\', \'' + listType + '\', ' + idx + ', this.value)">' + (item.text || '') + '</textarea>'
       + '<button class="item-delete" onclick="deleteItem(\'' + cardId + '\', \'' + listType + '\', ' + idx + ')">X</button>'
       + '</div>';
}

// ============================
// DATA OPERATIONS
// ============================
function findCard(id) {
  if (!data || !data.phases) return null;
  for (var p = 0; p < data.phases.length; p++) {
    var phase = data.phases[p];
    for (var r = 0; r < phase.rows.length; r++) {
      var row = phase.rows[r];
      for (var c = 0; c < row.columns.length; c++) {
        var col = row.columns[c];
        if (!col) continue;
        for (var i = 0; i < col.length; i++) {
          if (col[i].id === id) return col[i];
        }
      }
    }
  }
  return null;
}

function findNonWeeklyCard(id) {
  if (!data || !data.nonWeeklyTasks) return null;
  for (var i = 0; i < data.nonWeeklyTasks.length; i++) {
    if (data.nonWeeklyTasks[i].id === id) return data.nonWeeklyTasks[i];
  }
  return null;
}

function updateKnown(cardId, value) {
  var card = findCard(cardId) || findNonWeeklyCard(cardId);
  if (card) { card.details.known = value; save(); }
}

function updateItemText(cardId, listType, idx, value) {
  var card = findCard(cardId) || findNonWeeklyCard(cardId);
  if (card && card.details[listType] && card.details[listType][idx]) {
    card.details[listType][idx].text = value; save();
  }
}

function updateItemPriority(cardId, listType, idx, value) {
  var card = findCard(cardId) || findNonWeeklyCard(cardId);
  if (card && card.details[listType] && card.details[listType][idx]) {
    card.details[listType][idx].priority = value; save(); render(); renderNonWeekly();
  }
}

function addItem(cardId, listType) {
  var card = findCard(cardId) || findNonWeeklyCard(cardId);
  if (!card) return;
  if (!card.details[listType]) card.details[listType] = [];
  card.details[listType].push({ text: "", priority: "P1", note: "" });
  save(); renderPanelBody(card);
  setTimeout(function() {
    var list = document.getElementById(listType + '-' + cardId);
    if (list) { var last = list.querySelector('.item-row:last-child .item-text'); if (last) last.focus(); }
  }, 50);
}

function deleteItem(cardId, listType, idx) {
  var card = findCard(cardId) || findNonWeeklyCard(cardId);
  if (!card) return;
  card.details[listType].splice(idx, 1);
  save(); renderPanelBody(card); render(); renderNonWeekly();
}

function addQuestion(cardId) {
  var card = findCard(cardId) || findNonWeeklyCard(cardId);
  if (!card) return;
  if (!card.details.questions) card.details.questions = [];
  card.details.questions.push({ text: "", resolved: false });
  save(); renderPanelBody(card);
  setTimeout(function() {
    var list = document.getElementById('questions-' + cardId);
    if (list) { var last = list.querySelector('.question-row:last-child .item-text'); if (last) last.focus(); }
  }, 50);
}

function updateQuestion(cardId, idx, value) {
  var card = findCard(cardId) || findNonWeeklyCard(cardId);
  if (card && card.details.questions && card.details.questions[idx]) {
    card.details.questions[idx].text = value; save();
  }
}

function toggleQuestion(cardId, idx, checked) {
  var card = findCard(cardId) || findNonWeeklyCard(cardId);
  if (card && card.details.questions && card.details.questions[idx]) {
    card.details.questions[idx].resolved = checked;
    save(); renderPanelBody(card); render(); renderNonWeekly();
  }
}

function deleteQuestion(cardId, idx) {
  var card = findCard(cardId) || findNonWeeklyCard(cardId);
  if (!card) return;
  card.details.questions.splice(idx, 1);
  save(); renderPanelBody(card); render(); renderNonWeekly();
}

// ============================
// ADD STEP (new card in column)
// ============================
function addStep(phaseId, rowIdx, colIdx) {
  var title = prompt("输入步骤名称：");
  if (!title || !title.trim()) return;
  title = title.trim();

  var phase = data.phases.find(function(p) { return p.id === phaseId; });
  if (!phase) return;
  var row = phase.rows[rowIdx];
  if (!row) return;
  while (row.columns.length <= colIdx) row.columns.push([]);
  if (!row.columns[colIdx]) row.columns[colIdx] = [];

  var newCard = {
    id: "step-" + Date.now(),
    icon: title.charAt(0),
    title: title,
    desc: "",
    role: "admin",
    roleLabel: "团长",
    details: { known: "", pains: [], keeps: [], questions: [] }
  };

  row.columns[colIdx].push(newCard);
  save();
  render();
  renderNonWeekly();
  showToast("已添加「" + title + "」");
}

// ============================
// ADD NON-WEEKLY TASK
// ============================
function addNonWeeklyTask() {
  var title = prompt("输入任务名称：");
  if (!title || !title.trim()) return;
  title = title.trim();

  var cadence = prompt("输入频率（如：每周、每月、按需）：", "每周");
  if (!cadence || !cadence.trim()) cadence = "每周";
  cadence = cadence.trim();

  if (!data.nonWeeklyTasks) data.nonWeeklyTasks = [];

  var newTask = {
    id: "nw-" + Date.now(),
    icon: title.charAt(0),
    title: title,
    desc: "",
    role: "admin",
    roleLabel: "团长",
    cadence: cadence,
    details: { known: "", pains: [], keeps: [], questions: [] }
  };

  data.nonWeeklyTasks.push(newTask);
  save();
  render();
  renderNonWeekly();
  showToast("已添加「" + title + "」");
}

// ============================
// DRAG AND DROP
// ============================
var dropTargetInfo = null; // { phaseId, rowIdx, colIdx, insertIdx }

function onDragStart(e, phaseId, rowIdx, colIdx, cardIdx) {
  dragSourceInfo = { phaseId: phaseId, rowIdx: rowIdx, colIdx: colIdx, cardIdx: cardIdx };
  // Delay adding class so the drag image captures the card properly
  setTimeout(function() { e.target.classList.add('dragging'); }, 0);
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', '');
}

function onDragEnd(e) {
  e.target.classList.remove('dragging');
  clearPlaceholder();
  dragSourceInfo = null;
  dropTargetInfo = null;
}

function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  if (!dragSourceInfo) return;

  var col = e.currentTarget;
  var phaseId = col.dataset.phase;
  var rowIdx = parseInt(col.dataset.row);
  var colIdx = parseInt(col.dataset.col);

  // Find insert position based on mouse Y relative to cards
  var cards = col.querySelectorAll('.activity');
  var insertIdx = cards.length; // default: end
  for (var i = 0; i < cards.length; i++) {
    var rect = cards[i].getBoundingClientRect();
    if (e.clientY < rect.top + rect.height / 2) {
      insertIdx = i;
      break;
    }
  }

  // Adjust index: if dragging within same column and source is before insert, account for removal
  var sameCol = (dragSourceInfo.phaseId === phaseId &&
                 dragSourceInfo.rowIdx === rowIdx &&
                 dragSourceInfo.colIdx === colIdx);
  var adjustedIdx = insertIdx;
  if (sameCol && dragSourceInfo.cardIdx < insertIdx) {
    adjustedIdx--;
  }
  // Skip if placeholder is already in the right place
  if (dropTargetInfo &&
      dropTargetInfo.phaseId === phaseId &&
      dropTargetInfo.rowIdx === rowIdx &&
      dropTargetInfo.colIdx === colIdx &&
      dropTargetInfo.insertIdx === adjustedIdx) {
    return;
  }

  dropTargetInfo = { phaseId: phaseId, rowIdx: rowIdx, colIdx: colIdx, insertIdx: adjustedIdx };
  showPlaceholder(col, insertIdx, sameCol ? dragSourceInfo.cardIdx : -1);
}

function onDragLeave(e) {
  // Only clear if we actually left the column (not entering a child)
  if (!e.currentTarget.contains(e.relatedTarget)) {
    clearPlaceholderInColumn(e.currentTarget);
  }
}

function showPlaceholder(column, insertIdx, skipIdx) {
  // Remove any existing placeholders
  document.querySelectorAll('.drop-placeholder').forEach(function(el) { el.remove(); });

  var cards = column.querySelectorAll('.activity');
  var placeholder = document.createElement('div');
  placeholder.className = 'drop-placeholder';

  // Measure card height for placeholder
  var refCard = column.querySelector('.activity:not(.dragging)');
  if (refCard) {
    placeholder.style.height = refCard.offsetHeight + 'px';
  } else {
    placeholder.style.height = '60px';
  }

  // Find the reference node to insert before
  // Filter out dragging card and arrows
  var childNodes = [];
  for (var i = 0; i < column.children.length; i++) {
    var child = column.children[i];
    if (child.classList.contains('activity') || child.classList.contains('arrow-down')) {
      childNodes.push(child);
    }
  }

  // Map insertIdx to actual DOM position (accounting for arrows between cards)
  var activityNodes = column.querySelectorAll('.activity');
  if (insertIdx >= activityNodes.length) {
    // Insert before the add button
    var addBtn = column.querySelector('.add-step-btn');
    column.insertBefore(placeholder, addBtn);
  } else {
    column.insertBefore(placeholder, activityNodes[insertIdx]);
  }
}

function clearPlaceholder() {
  document.querySelectorAll('.drop-placeholder').forEach(function(el) { el.remove(); });
}

function clearPlaceholderInColumn(column) {
  column.querySelectorAll('.drop-placeholder').forEach(function(el) { el.remove(); });
  dropTargetInfo = null;
}

function onDrop(e) {
  e.preventDefault();
  clearPlaceholder();
  if (!dragSourceInfo) return;

  var tgtPhaseId = e.currentTarget.dataset.phase;
  var tgtRowIdx = parseInt(e.currentTarget.dataset.row);
  var tgtColIdx = parseInt(e.currentTarget.dataset.col);

  var srcPhase = data.phases.find(function(p) { return p.id === dragSourceInfo.phaseId; });
  var srcCol = srcPhase.rows[dragSourceInfo.rowIdx].columns[dragSourceInfo.colIdx];

  var tgtPhase = data.phases.find(function(p) { return p.id === tgtPhaseId; });
  if (!tgtPhase.rows[tgtRowIdx].columns[tgtColIdx]) tgtPhase.rows[tgtRowIdx].columns[tgtColIdx] = [];
  var tgtCol = tgtPhase.rows[tgtRowIdx].columns[tgtColIdx];

  // Determine insert position
  var insertIdx = tgtCol.length; // default: end
  if (dropTargetInfo &&
      dropTargetInfo.phaseId === tgtPhaseId &&
      dropTargetInfo.rowIdx === tgtRowIdx &&
      dropTargetInfo.colIdx === tgtColIdx) {
    insertIdx = dropTargetInfo.insertIdx;
  }

  // Remove card from source
  var card = srcCol.splice(dragSourceInfo.cardIdx, 1)[0];

  // Insert at target position
  tgtCol.splice(insertIdx, 0, card);

  dragSourceInfo = null;
  dropTargetInfo = null;
  save(); render(); renderNonWeekly();
  showToast("已移动「" + card.title + "」");
}

// ============================
// IMPORT / EXPORT
// ============================
function exportData() {
  var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'tuangou-requirements-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast("已导出 JSON 文件");
}

function importData(event) {
  var file = event.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      data = JSON.parse(e.target.result);
      save(); render(); renderNonWeekly();
      showToast("已导入数据");
    } catch(err) {
      showToast("导入失败：文件格式错误");
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function resetData() {
  if (!confirm("确定要重置所有数据？这将清除所有编辑内容，且所有协作者都会受到影响。")) return;
  data = JSON.parse(JSON.stringify(DEFAULT_DATA));
  save(); render(); renderNonWeekly(); closePanel();
  showToast("已重置为默认数据");
}

// ============================
// UTILS
// ============================
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
  el.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = this.scrollHeight + 'px';
  });
}

function showToast(msg) {
  var toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.classList.add("show");
  setTimeout(function() { toast.classList.remove("show"); }, 2000);
}

document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closePanel(); });

// Start
initFirebase();
</script>
