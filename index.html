<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>团购每周流程 -- 交互式需求文档</title>
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
  :root {
    --admin: #2563eb;
    --admin-bg: #eff6ff;
    --admin-border: #bfdbfe;
    --admin-hover: #dbeafe;
    --user: #059669;
    --user-bg: #ecfdf5;
    --user-border: #a7f3d0;
    --user-hover: #d1fae5;
    --volunteer: #d97706;
    --volunteer-bg: #fffbeb;
    --volunteer-border: #fde68a;
    --volunteer-hover: #fef3c7;
    --supplier: #7c3aed;
    --supplier-bg: #f5f3ff;
    --supplier-border: #ddd6fe;
    --supplier-hover: #ede9fe;
    --line: #cbd5e1;
    --bg: #f8fafc;
    --text: #1e293b;
    --text-muted: #64748b;
    --card-shadow: 0 1px 3px rgba(0,0,0,0.06);
    --panel-width: 520px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 40px 20px;
    transition: padding-right 0.3s;
  }

  body.panel-open {
    padding-right: calc(var(--panel-width) + 20px);
  }

  .container {
    max-width: 1400px;
    margin: 0 auto;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }

  h1 { font-size: 28px; font-weight: 700; }

  .header-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  .btn {
    padding: 6px 14px;
    border-radius: 8px;
    border: 1.5px solid var(--line);
    background: white;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.15s;
    color: var(--text);
  }

  .btn:hover { background: #f1f5f9; border-color: #94a3b8; }
  .btn.primary { background: var(--admin); color: white; border-color: var(--admin); }
  .btn.primary:hover { background: #1d4ed8; }
  .btn.danger { color: #dc2626; border-color: #fca5a5; }
  .btn.danger:hover { background: #fef2f2; }

  .subtitle {
    text-align: center;
    color: var(--text-muted);
    font-size: 15px;
    margin-bottom: 32px;
  }

  /* Sync status */
  .sync-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-muted);
    padding: 4px 10px;
    border-radius: 6px;
    background: #f1f5f9;
  }

  .sync-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #94a3b8;
  }

  .sync-dot.connected { background: #22c55e; }
  .sync-dot.syncing { background: #f59e0b; animation: pulse 1s infinite; }

  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* Legend */
  .legend {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-bottom: 36px;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 500;
  }

  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
  }

  /* Timeline grid */
  .timeline {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 0;
    position: relative;
  }

  /* Sticky header row */
  .sticky-header {
    position: sticky;
    top: 0;
    z-index: 20;
    background: var(--bg);
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    border-bottom: 1px solid var(--line);
    margin: 0 -20px;
    padding: 0 20px;
  }

  /* Day headers */
  .day-header {
    text-align: center;
    padding: 12px 8px;
  }

  .day-label {
    font-size: 13px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .day-name { font-size: 20px; font-weight: 700; }

  /* Connector */
  .connector-row {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    position: relative;
    height: 40px;
    align-items: center;
  }

  .connector-row::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 5%;
    right: 5%;
    height: 3px;
    background: linear-gradient(90deg, var(--line), var(--admin), var(--user), var(--volunteer), var(--line));
    border-radius: 2px;
    transform: translateY(-50%);
  }

  .connector-dot {
    width: 14px;
    height: 14px;
    background: white;
    border: 3px solid var(--admin);
    border-radius: 50%;
    margin: 0 auto;
    position: relative;
    z-index: 2;
  }

  .connector-dot:nth-child(1) { border-color: var(--line); background: var(--bg); }
  .connector-dot:nth-child(6) { border-color: var(--volunteer); }
  .connector-dot:nth-child(7) { border-color: var(--line); background: var(--bg); }

  /* Phase cards grid - uses CSS grid for spanning */
  .phase-grid {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 10px 12px;
    padding: 0 8px;
    margin-top: 8px;
  }

  /* Activity cards */
  .activity {
    border-radius: 12px;
    padding: 14px;
    position: relative;
    border: 1.5px solid;
    transition: transform 0.15s, box-shadow 0.15s;
    cursor: pointer;
    user-select: none;
  }

  .activity:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  }

  .activity.selected {
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.3), 0 4px 16px rgba(0,0,0,0.1);
    transform: translateY(-2px);
  }

  .activity.dragging { opacity: 0.15; transform: scale(0.95); height: 0; padding: 0; margin: 0; overflow: hidden; border: none; }

  .activity.admin { background: var(--admin-bg); border-color: var(--admin-border); }
  .activity.user { background: var(--user-bg); border-color: var(--user-border); }
  .activity.volunteer { background: var(--volunteer-bg); border-color: var(--volunteer-border); }
  .activity.supplier { background: var(--supplier-bg); border-color: var(--supplier-border); }

  /* Drop placeholder */
  .drop-placeholder {
    border: 2px dashed var(--admin);
    border-radius: 12px;
    background: rgba(37, 99, 235, 0.05);
    transition: height 0.2s ease;
    min-height: 20px;
  }

  .activity-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 4px;
    line-height: 1.3;
  }

  .admin .activity-title { color: var(--admin); }
  .user .activity-title { color: var(--user); }
  .volunteer .activity-title { color: var(--volunteer); }
  .supplier .activity-title { color: var(--supplier); }

  .activity-desc {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  .activity-role {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 2px 8px;
    border-radius: 4px;
    margin-top: 8px;
  }

  .admin .activity-role { background: var(--admin); color: white; }
  .user .activity-role { background: var(--user); color: white; }
  .volunteer .activity-role { background: var(--volunteer); color: white; }
  .supplier .activity-role { background: var(--supplier); color: white; }

  .drag-handle {
    position: absolute;
    top: 8px;
    right: 8px;
    color: var(--line);
    font-size: 14px;
    cursor: grab;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .activity:hover .drag-handle { opacity: 1; }

  .card-badges {
    display: flex;
    gap: 4px;
    margin-top: 8px;
    flex-wrap: wrap;
  }

  .card-badge {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 4px;
    background: rgba(0,0,0,0.06);
    color: var(--text-muted);
  }

  .card-badge.pain { background: #fee2e2; color: #dc2626; }
  .card-badge.open { background: #fef3c7; color: #b45309; }

  .arrow-down {
    text-align: center;
    color: var(--line);
    font-size: 18px;
    line-height: 1;
    margin: -4px 0;
    pointer-events: none;
  }

  /* Resize handle */
  .resize-handle {
    position: absolute;
    top: 0;
    right: 0;
    width: 8px;
    height: 100%;
    cursor: col-resize;
    opacity: 0;
    transition: opacity 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 5;
  }

  .resize-handle::before {
    content: '';
    width: 3px;
    height: 24px;
    border-radius: 2px;
    background: var(--line);
  }

  .activity:hover .resize-handle { opacity: 1; }

  .activity.resizing {
    z-index: 10;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  }

  .activity.resizing .resize-handle { opacity: 1; }
  .activity.resizing .resize-handle::before { background: var(--admin); }

  /* Metadata fields in panel */
  .meta-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .meta-field { display: flex; flex-direction: column; gap: 4px; }
  .meta-field.full { grid-column: 1 / -1; }

  .meta-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .meta-input {
    padding: 8px 10px;
    border: 1.5px solid #e2e8f0;
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
    color: var(--text);
    background: #fafbfc;
    transition: border-color 0.15s;
  }

  .meta-input:focus {
    outline: none;
    border-color: var(--admin);
    background: white;
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
  }

  .meta-select {
    padding: 8px 10px;
    border: 1.5px solid #e2e8f0;
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
    color: var(--text);
    background: #fafbfc;
    cursor: pointer;
  }

  .meta-select:focus {
    outline: none;
    border-color: var(--admin);
  }

  /* Role management bar */
  .role-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 36px;
  }

  .role-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    border: 1.5px solid;
    cursor: pointer;
    position: relative;
    transition: box-shadow 0.15s;
  }

  .role-chip:hover {
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }

  .role-chip .role-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .role-chip .role-remove {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: none;
    background: rgba(0,0,0,0.08);
    cursor: pointer;
    font-size: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.15s, background 0.15s;
    margin-left: 2px;
  }

  .role-chip:hover .role-remove { opacity: 1; }
  .role-chip .role-remove:hover { background: #fee2e2; color: #dc2626; }

  .role-chip-add {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 13px;
    border: 1.5px dashed var(--line);
    cursor: pointer;
    color: var(--text-muted);
    background: white;
    transition: all 0.15s;
  }

  .role-chip-add:hover {
    border-color: var(--admin);
    color: var(--admin);
  }

  /* Role edit popover */
  .role-popover {
    position: fixed;
    z-index: 150;
    background: white;
    border-radius: 12px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.15);
    padding: 16px;
    width: 260px;
  }

  .role-popover-title {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 12px;
  }

  .role-popover-field {
    margin-bottom: 10px;
  }

  .role-popover-field label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .role-popover-field input {
    width: 100%;
    padding: 8px 10px;
    border: 1.5px solid #e2e8f0;
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
  }

  .role-popover-field input:focus { outline: none; border-color: var(--admin); }

  .color-picker-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }

  .color-swatch {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 8px;
    cursor: pointer;
    border: 2.5px solid transparent;
    transition: border-color 0.15s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .color-swatch:hover { transform: scale(1.1); }
  .color-swatch.selected { border-color: var(--text); }

  .color-swatch .swatch-check {
    font-size: 14px;
    font-weight: 700;
    color: white;
  }

  .role-popover-actions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }

  .role-popover-overlay {
    position: fixed;
    inset: 0;
    z-index: 140;
  }

  /* Custom role colors (5th+ roles cycle through these) */
  .activity.custom0 { background: #fdf2f8; border-color: #fbcfe8; }
  .custom0 .activity-title { color: #db2777; }
  .custom0 .activity-role { background: #db2777; color: white; }

  .activity.custom1 { background: #ecfeff; border-color: #a5f3fc; }
  .custom1 .activity-title { color: #0891b2; }
  .custom1 .activity-role { background: #0891b2; color: white; }

  .activity.custom2 { background: #fefce8; border-color: #fde047; }
  .custom2 .activity-title { color: #a16207; }
  .custom2 .activity-role { background: #a16207; color: white; }

  .activity.custom3 { background: #f0fdfa; border-color: #99f6e4; }
  .custom3 .activity-title { color: #0d9488; }
  .custom3 .activity-role { background: #0d9488; color: white; }

  .nw-card.custom0 { background: #fdf2f8; border-color: #fbcfe8; }
  .nw-card.custom0 .nw-card-title { color: #db2777; }
  .nw-card.custom0 .nw-card-role { background: #db2777; color: white; }

  .nw-card.custom1 { background: #ecfeff; border-color: #a5f3fc; }
  .nw-card.custom1 .nw-card-title { color: #0891b2; }
  .nw-card.custom1 .nw-card-role { background: #0891b2; color: white; }

  .nw-card.custom2 { background: #fefce8; border-color: #fde047; }
  .nw-card.custom2 .nw-card-title { color: #a16207; }
  .nw-card.custom2 .nw-card-role { background: #a16207; color: white; }

  .nw-card.custom3 { background: #f0fdfa; border-color: #99f6e4; }
  .nw-card.custom3 .nw-card-title { color: #0d9488; }
  .nw-card.custom3 .nw-card-role { background: #0d9488; color: white; }

  /* Day column drop targets (rendered in add-step row) */
  .add-step-row {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 12px;
    padding: 0 8px;
    margin-top: 4px;
  }

  .day-drop-zone {
    min-height: 40px;
    border-radius: 12px;
    padding: 4px;
    transition: background 0.2s;
  }

  .day-drop-zone.drag-over {
    background: rgba(37, 99, 235, 0.06);
    outline: 2px dashed var(--admin-border);
    outline-offset: -2px;
  }

  /* Phase dividers */
  .phase-row {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 24px 0 12px;
    padding: 0 8px;
  }

  .phase-line { flex: 1; height: 1px; background: var(--line); }

  .phase-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    white-space: nowrap;
  }

  /* Add step button */
  .add-step-btn {
    width: 100%;
    padding: 6px 0;
    border: 1.5px dashed var(--line);
    border-radius: 8px;
    background: transparent;
    cursor: pointer;
    font-size: 12px;
    color: var(--text-muted);
    transition: all 0.15s;
    margin-top: 4px;
  }

  .add-step-btn:hover {
    border-color: var(--admin);
    color: var(--admin);
    background: var(--admin-bg);
  }

  /* ======================== */
  /* Non-Weekly Tasks Section  */
  /* ======================== */
  .non-weekly-section {
    margin-top: 48px;
  }

  .non-weekly-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .non-weekly-title {
    font-size: 20px;
    font-weight: 700;
  }

  .non-weekly-grid {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }

  .nw-card {
    border-radius: 12px;
    padding: 16px;
    border: 1.5px solid;
    cursor: pointer;
    user-select: none;
    min-width: 200px;
    max-width: 280px;
    flex: 1;
    transition: transform 0.15s, box-shadow 0.15s;
  }

  .nw-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  }

  .nw-card.selected {
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.3), 0 4px 16px rgba(0,0,0,0.1);
    transform: translateY(-2px);
  }

  .nw-card.admin { background: var(--admin-bg); border-color: var(--admin-border); }
  .nw-card.user { background: var(--user-bg); border-color: var(--user-border); }
  .nw-card.volunteer { background: var(--volunteer-bg); border-color: var(--volunteer-border); }
  .nw-card.supplier { background: var(--supplier-bg); border-color: var(--supplier-border); }


  .nw-card-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .nw-card.admin .nw-card-title { color: var(--admin); }
  .nw-card.user .nw-card-title { color: var(--user); }
  .nw-card.volunteer .nw-card-title { color: var(--volunteer); }
  .nw-card.supplier .nw-card-title { color: var(--supplier); }

  .nw-card-desc {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
    margin-bottom: 8px;
  }

  .cadence-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
    background: rgba(0,0,0,0.06);
    color: var(--text-muted);
  }

  .nw-card-role {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 2px 8px;
    border-radius: 4px;
    margin-left: 4px;
  }

  .nw-card.admin .nw-card-role { background: var(--admin); color: white; }
  .nw-card.user .nw-card-role { background: var(--user); color: white; }
  .nw-card.volunteer .nw-card-role { background: var(--volunteer); color: white; }
  .nw-card.supplier .nw-card-role { background: var(--supplier); color: white; }

  .add-nw-card {
    border-radius: 12px;
    padding: 16px;
    border: 1.5px dashed var(--line);
    cursor: pointer;
    min-width: 200px;
    max-width: 280px;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    font-size: 13px;
    transition: all 0.15s;
  }

  .add-nw-card:hover {
    border-color: var(--admin);
    color: var(--admin);
    background: var(--admin-bg);
  }

  /* ======================== */
  /* Side Panel               */
  /* ======================== */
  .side-panel {
    position: fixed;
    top: 0;
    right: 0;
    width: var(--panel-width);
    height: 100vh;
    background: white;
    box-shadow: -4px 0 24px rgba(0,0,0,0.1);
    transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 100;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .side-panel.open { transform: translateX(0); }

  .panel-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid #e2e8f0;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    flex-shrink: 0;
  }

  .panel-header-icon {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 700;
    color: white;
    flex-shrink: 0;
  }

// DATA MIGRATION
// ============================
// Convert old column-based rows to new flat cards array
// Firebase can convert arrays to objects with numeric keys; fix that
function ensureArray(val) {
  if (!val) return [];
  if (Array.isArray(val)) return val;
  if (typeof val === 'object') {
    var arr = [];
    Object.keys(val).forEach(function(k) { arr.push(val[k]); });
    return arr;
  }
  return [];
}

function migrateData(d) {
  if (!d || !d.phases) return d;
  // Ensure roles array exists
  if (!d.roles) {
    d.roles = [
      { id: "admin", label: "团长", color: "admin" },
      { id: "user", label: "团员", color: "user" },
      { id: "volunteer", label: "义工", color: "volunteer" },
      { id: "supplier", label: "货源", color: "supplier" }
    ];
  }
  d.roles = ensureArray(d.roles);
  if (!d.nonWeeklyTasks) d.nonWeeklyTasks = [];
  d.nonWeeklyTasks = ensureArray(d.nonWeeklyTasks);
  d.phases = ensureArray(d.phases);
  d.phases.forEach(function(phase) {
    // Remove spanBars
    delete phase.spanBars;
    phase.rows = ensureArray(phase.rows);
    phase.rows.forEach(function(row) {
      if (row.columns && !row.cards) {
        // Migrate from columns to flat cards
        var columns = ensureArray(row.columns);
        var cards = [];
        for (var c = 0; c < columns.length; c++) {
          var col = ensureArray(columns[c]);
          for (var i = 0; i < col.length; i++) {
            var card = col[i];
            if (!card) continue;
            if (card.colIdx === undefined && card.colIdx !== 0) card.colIdx = c;
            if (!card.spanDays) card.spanDays = 1;
            if (card.details) {
              card.details.pains = ensureArray(card.details.pains);
              card.details.keeps = ensureArray(card.details.keeps);
              card.details.questions = ensureArray(card.details.questions);
            }
            cards.push(card);
          }
        }
        row.cards = cards;
        delete row.columns;
      } else {
        row.cards = ensureArray(row.cards);
        row.cards.forEach(function(card) {
          if (!card) return;
          if (card.colIdx === undefined) card.colIdx = 0;
          if (!card.spanDays) card.spanDays = 1;
          if (card.details) {
            card.details.pains = ensureArray(card.details.pains);
            card.details.keeps = ensureArray(card.details.keeps);
            card.details.questions = ensureArray(card.details.questions);
          }
        });
        // Remove any null/undefined entries
        row.cards = row.cards.filter(function(c) { return !!c; });
      }
    });
  });
  // Ensure nonWeeklyTasks details are arrays too
  d.nonWeeklyTasks.forEach(function(task) {
    if (task && task.details) {
      task.details.pains = ensureArray(task.details.pains);
      task.details.keeps = ensureArray(task.details.keeps);
      task.details.questions = ensureArray(task.details.questions);
    }
  });
  return d;
}

// ============================
// FIREBASE SYNC
// ============================
function initFirebase() {
  // Listen for data changes (real-time sync)
  dataRef.on('value', (snapshot) => {
    const val = snapshot.val();

    // If this is our own save echoing back and user is editing, skip full re-render
    var panelBody = document.getElementById('panelBody');
    var isEditing = panelBody && panelBody.contains(document.activeElement);

    if (isSaving && isEditing && !isInitialLoad) {
      // Our own write echoed back while user is typing — skip to avoid losing focus
      setSyncStatus('connected');
      return;
    }

    if (val) {
      data = migrateData(val);
    } else {
      // First time -- seed with default data
      data = JSON.parse(JSON.stringify(DEFAULT_DATA));
      dataRef.set(data);
    }

    render();
    renderNonWeekly();
    renderLegend();

    // Re-render panel if open, BUT only if user is not actively editing
    if (selectedCardId && !isEditing) {
      var card = findCard(selectedCardId) || findNonWeeklyCard(selectedCardId);
      if (card) renderPanelBody(card);
    }

    if (isInitialLoad) {
      isInitialLoad = false;
      document.getElementById('loadingOverlay').classList.add('hidden');
    }

    setSyncStatus('connected');
  }, (error) => {
    console.error('Firebase error:', error);
    setSyncStatus('error');
    // Fallback to localStorage
    const saved = localStorage.getItem('tuangou_flow_backup');
    if (saved && !data) {
      data = migrateData(JSON.parse(saved));
      render();
      renderNonWeekly();
      document.getElementById('loadingOverlay').classList.add('hidden');
    }
  });

  // Connection state
  db.ref('.info/connected').on('value', (snap) => {
    setSyncStatus(snap.val() ? 'connected' : 'disconnected');
  });
}

function setSyncStatus(status) {
  const dot = document.getElementById('syncDot');
  const text = document.getElementById('syncText');
  dot.className = 'sync-dot';
  switch (status) {
    case 'connected':
      dot.classList.add('connected');
      text.textContent = '已同步';
      break;
    case 'syncing':
      dot.classList.add('syncing');
      text.textContent = '同步中...';
      break;
    case 'disconnected':
      text.textContent = '离线';
      break;
    case 'error':
      text.textContent = '连接失败';
      break;
  }
}

function save() {
  // Debounce writes to Firebase
  if (saveTimeout) clearTimeout(saveTimeout);
  isSaving = true;
  setSyncStatus('syncing');
  saveTimeout = setTimeout(() => {
    dataRef.set(data).then(() => {
      // Small delay before clearing isSaving so the echo callback is ignored
      setTimeout(function() { isSaving = false; }, 300);
      setSyncStatus('connected');
    }).catch((err) => {
      isSaving = false;
      console.error('Save error:', err);
      setSyncStatus('error');
    });
    // Also backup to localStorage
    localStorage.setItem('tuangou_flow_backup', JSON.stringify(data));
  }, 500);
}

// ============================
// ROW ALLOCATION for grid layout
// ============================
// Given a list of cards with colIdx and spanDays, compute gridRow for each
// Returns an array of { card, gridRow, gridCol, gridSpan }
function computeRowAllocations(cards) {
  // Process cards in original array order.
  // Key rule: a card must be placed at or below the row of any
  // previously-placed card that overlaps any of its columns.
  // This ensures cards that come later in the array always appear
  // visually below earlier cards in the same column space.

  // Track which (row, col) cells are occupied
  var occupied = {};
  // Track the max row used per column by previously-placed cards
  // so later cards in that column go below
  var colMaxRow = {};

  function isFree(row, col, span) {
    for (var c = col; c < col + span; c++) {
      if (occupied[row] && occupied[row][c]) return false;
    }
    return true;
  }

  function markOccupied(row, col, span) {
    if (!occupied[row]) occupied[row] = {};
    for (var c = col; c < col + span; c++) {
      occupied[row][c] = true;
    }
  }

  var result = [];
  cards.forEach(function(card) {
    var col = card.colIdx || 0;
    var span = card.spanDays || 1;

    // Minimum row: must be after any previously-placed card
    // that touches any column this card occupies
    var minRow = 1;
    for (var c = col; c < col + span; c++) {
      if (colMaxRow[c] && colMaxRow[c] >= minRow) {
        minRow = colMaxRow[c] + 1;
      }
    }

    // Find first available row starting from minRow
    var row = minRow;
    while (!isFree(row, col, span)) {
      row++;
    }
    markOccupied(row, col, span);

    // Update colMaxRow for all columns this card occupies
    for (var c = col; c < col + span; c++) {
      if (!colMaxRow[c] || row > colMaxRow[c]) {
        colMaxRow[c] = row;
      }
    }

    result.push({ card: card, gridRow: row, gridCol: col + 1, gridSpan: span });
  });

  return result;
}

// ============================
// RENDER
// ============================
function render() {
  if (!data) return;
  var tl = document.getElementById("timeline");
  var html = "";

  // Day headers are rendered in the sticky container outside the timeline
  var stickyEl = document.getElementById('stickyHeader');
  if (stickyEl) {
    var stickyHtml = '';
    DAY_LABELS.forEach(function(d) {
      stickyHtml += '<div class="day-header"><div class="day-label">' + d.en + '</div><div class="day-name">' + d.zh + '</div></div>';
    });
    stickyEl.innerHTML = stickyHtml;
  }

  data.phases.forEach(function(phase) {
    html += '<div class="phase-row"><div class="phase-line"></div><div class="phase-label">' + phase.label + '</div><div class="phase-line"></div></div>';

    phase.rows.forEach(function(row, rowIdx) {
      var cards = row.cards || [];
      var allocations = computeRowAllocations(cards);

      // Compute max row used
      var maxRow = 0;
      allocations.forEach(function(a) { if (a.gridRow > maxRow) maxRow = a.gridRow; });

      // Render phase grid
      html += '<div class="phase-grid" data-phase="' + phase.id + '" data-row="' + rowIdx + '"'
            + ' style="grid-template-rows: repeat(' + (maxRow || 1) + ', auto);"'
            + ' ondragover="onGridDragOver(event)" ondrop="onGridDrop(event)">';

      allocations.forEach(function(a) {
        var card = a.card;
        var isSelected = selectedCardId === card.id;
        var painCount = card.details && card.details.pains ? card.details.pains.length : 0;
        var qCount = card.details && card.details.questions ? card.details.questions.filter(function(q) { return !q.resolved; }).length : 0;
        var borderStyle = card.style === 'dashed' ? 'border-style:dashed;opacity:0.8;' : '';

        var gridStyle = 'grid-column: ' + a.gridCol + ' / span ' + a.gridSpan + '; grid-row: ' + a.gridRow + ';';

        var roleClass = getRoleColorClass(card.role);
        html += '<div class="activity ' + roleClass + (isSelected ? ' selected' : '') + '"'
              + ' style="' + borderStyle + gridStyle + '"'
              + ' draggable="true" data-card-id="' + card.id + '"'
              + ' data-phase="' + phase.id + '" data-row="' + rowIdx + '"'
              + ' onclick="onCardClick(event, \'' + card.id + '\')"'
              + ' ondragstart="onDragStart(event, \'' + phase.id + '\', ' + rowIdx + ', \'' + card.id + '\')"'
              + ' ondragend="onDragEnd(event)">'
              + '<div class="drag-handle">///</div>'
              + '<div class="activity-title">' + card.title + '</div>'
              + '<div class="activity-desc">' + card.desc + '</div>'
              + '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">'
              + '<div class="activity-role">' + card.roleLabel + '</div>';
        if (painCount > 0) html += '<span class="card-badge pain">' + painCount + ' 痛点</span>';
        if (qCount > 0) html += '<span class="card-badge open">' + qCount + ' 待确认</span>';
        html += '</div>';
        // Resize handle
        if (a.gridSpan < 7 - (card.colIdx || 0)) {
          html += '<div class="resize-handle" onmousedown="onResizeStart(event, \'' + card.id + '\', \'' + phase.id + '\', ' + rowIdx + ')"></div>';
        }
        html += '</div>';
      });

      html += '</div>';

      // Add-step buttons row
      html += '<div class="add-step-row">';
      for (var colIdx = 0; colIdx < 7; colIdx++) {
        html += '<div class="day-drop-zone" data-phase="' + phase.id + '" data-row="' + rowIdx + '" data-col="' + colIdx + '"'
              + ' ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">'
              + '<button class="add-step-btn" onclick="addStep(\'' + phase.id + '\', ' + rowIdx + ', ' + colIdx + ')">+ 添加</button>'
              + '</div>';
      }
      html += '</div>';
    });
  });

  tl.innerHTML = html;
}

// ============================
// PANEL
// ============================
function openPanel(cardId) {
  var card = findCard(cardId) || findNonWeeklyCard(cardId);
  if (!card) return;
  selectedCardId = cardId;
  render();
  renderNonWeekly();

  var iconEl = document.getElementById("panelIcon");
  iconEl.textContent = card.icon || card.title.charAt(0);
  iconEl.className = 'panel-header-icon ' + card.role;

  document.getElementById("panelTitle").textContent = card.title;
  document.getElementById("panelSubtitle").textContent = card.desc;
  renderPanelBody(card);
  document.getElementById("sidePanel").classList.add("open");
  document.getElementById("overlay").classList.add("show");
  document.body.classList.add("panel-open");
}

function closePanel() {
  document.getElementById("sidePanel").classList.remove("open");
  document.getElementById("overlay").classList.remove("show");
  document.body.classList.remove("panel-open");
  selectedCardId = null;
  render();
  renderNonWeekly();
}

       + '<select class="item-priority ' + p + '" onchange="updateItemPriority(\'' + cardId + '\', \'' + listType + '\', ' + idx + ', this.value); this.className=\'item-priority \'+this.value;">'
       + '<option ' + (p === 'P0' ? 'selected' : '') + '>P0</option>'
       + '<option ' + (p === 'P1' ? 'selected' : '') + '>P1</option>'
       + '<option ' + (p === 'P2' ? 'selected' : '') + '>P2</option>'
       + '<option ' + (p === 'P3' ? 'selected' : '') + '>P3</option>'
       + '</select>'
       + '<textarea class="item-text" oninput="updateItemText(\'' + cardId + '\', \'' + listType + '\', ' + idx + ', this.value)">' + (item.text || '') + '</textarea>'

       + '</div>';
}

// ============================
// DATA OPERATIONS
// ============================
function findCard(id) {
  if (!data || !data.phases) return null;
  for (var p = 0; p < data.phases.length; p++) {
    var phase = data.phases[p];
    for (var r = 0; r < phase.rows.length; r++) {
      var row = phase.rows[r];
      var cards = row.cards || [];
      for (var i = 0; i < cards.length; i++) {
        if (cards[i].id === id) return cards[i];
      }
    }
  }
  return null;
}

function findCardLocation(id) {
  if (!data || !data.phases) return null;
  for (var p = 0; p < data.phases.length; p++) {
    var phase = data.phases[p];
    for (var r = 0; r < phase.rows.length; r++) {
      var row = phase.rows[r];
      var cards = row.cards || [];
      for (var i = 0; i < cards.length; i++) {
        if (cards[i].id === id) {
          return { phase: phase, row: row, phaseIdx: p, rowIdx: r, cardIdx: i };
        }
      }
    }
  }
  return null;
}

function findNonWeeklyCard(id) {
  if (!data || !data.nonWeeklyTasks) return null;
  for (var i = 0; i < data.nonWeeklyTasks.length; i++) {
    if (data.nonWeeklyTasks[i].id === id) return data.nonWeeklyTasks[i];
  }
  return null;
}

function updateKnown(cardId, value) {
  var card = findCard(cardId) || findNonWeeklyCard(cardId);
  if (card) { card.details.known = value; save(); }
}

function updateItemText(cardId, listType, idx, value) {
  var card = findCard(cardId) || findNonWeeklyCard(cardId);
  if (card && card.details[listType] && card.details[listType][idx]) {
    card.details[listType][idx].text = value; save();
  }
}

function updateItemPriority(cardId, listType, idx, value) {
  var card = findCard(cardId) || findNonWeeklyCard(cardId);
  if (card && card.details[listType] && card.details[listType][idx]) {
    card.details[listType][idx].priority = value; save(); render(); renderNonWeekly();
  }
}

function addItem(cardId, listType) {
  var card = findCard(cardId) || findNonWeeklyCard(cardId);
  if (!card) return;
  if (!card.details[listType]) card.details[listType] = [];
  card.details[listType].push({ text: "", priority: "P1", note: "" });
  save(); renderPanelBody(card);
  setTimeout(function() {
    var list = document.getElementById(listType + '-' + cardId);
    if (list) { var last = list.querySelector('.item-row:last-child .item-text'); if (last) last.focus(); }
  }, 50);
}

function deleteItem(cardId, listType, idx) {
  var card = findCard(cardId) || findNonWeeklyCard(cardId);
  if (!card) return;
  card.details[listType].splice(idx, 1);
  save(); renderPanelBody(card); render(); renderNonWeekly();
}

function addQuestion(cardId) {
  var card = findCard(cardId) || findNonWeeklyCard(cardId);
  if (!card) return;
  if (!card.details.questions) card.details.questions = [];
  card.details.questions.push({ text: "", resolved: false });
  save(); renderPanelBody(card);
  setTimeout(function() {
    var list = document.getElementById('questions-' + cardId);
    if (list) { var last = list.querySelector('.question-row:last-child .item-text'); if (last) last.focus(); }
  }, 50);
}

function updateQuestion(cardId, idx, value) {
  var card = findCard(cardId) || findNonWeeklyCard(cardId);
  if (card && card.details.questions && card.details.questions[idx]) {
    card.details.questions[idx].text = value; save();
  }
}

function toggleQuestion(cardId, idx, checked) {
  var card = findCard(cardId) || findNonWeeklyCard(cardId);
  if (card && card.details.questions && card.details.questions[idx]) {
    card.details.questions[idx].resolved = checked;
    save(); renderPanelBody(card); render(); renderNonWeekly();
  }
}

function deleteQuestion(cardId, idx) {
  var card = findCard(cardId) || findNonWeeklyCard(cardId);
  if (!card) return;
  card.details.questions.splice(idx, 1);
  save(); renderPanelBody(card); render(); renderNonWeekly();
}

// ============================
// ADD STEP (new card in column)
// ============================
function addStep(phaseId, rowIdx, colIdx) {
  var title = prompt("输入步骤名称：");
  if (!title || !title.trim()) return;
  title = title.trim();

  var phase = data.phases.find(function(p) { return p.id === phaseId; });
  if (!phase) return;
  var row = phase.rows[rowIdx];
  if (!row) return;
  if (!row.cards) row.cards = [];

  var newCard = {
    id: "step-" + Date.now(),
    colIdx: colIdx,
    spanDays: 1,
    icon: title.charAt(0),
    title: title,
    desc: "",
    role: "admin",
    roleLabel: "团长",
    details: { known: "", pains: [], keeps: [], questions: [] }
  };

  row.cards.push(newCard);
  save();
  render();
  renderNonWeekly();
  showToast("已添加「" + title + "」");
}

// ============================
// ADD NON-WEEKLY TASK
// ============================
function addNonWeeklyTask() {
  var title = prompt("输入任务名称：");
  if (!title || !title.trim()) return;
  title = title.trim();

  var cadence = prompt("输入频率（如：每周、每月、按需）：", "每周");
  if (!cadence || !cadence.trim()) cadence = "每周";
  cadence = cadence.trim();

  if (!data.nonWeeklyTasks) data.nonWeeklyTasks = [];

  var newTask = {
    id: "nw-" + Date.now(),
    icon: title.charAt(0),
    title: title,
    desc: "",
    role: "admin",
    roleLabel: "团长",
    cadence: cadence,
    details: { known: "", pains: [], keeps: [], questions: [] }
  };

  data.nonWeeklyTasks.push(newTask);
  save();
  render();
  renderNonWeekly();
  showToast("已添加「" + title + "」");
}

// ============================
// CARD METADATA
// ============================
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function updateCardMeta(cardId, field, value) {
  var card = findCard(cardId) || findNonWeeklyCard(cardId);
  if (!card) return;
  card[field] = value;
  // Update panel header in real time
  if (field === 'title') document.getElementById("panelTitle").textContent = value;
  if (field === 'desc') document.getElementById("panelSubtitle").textContent = value;
  save();
  render();
  renderNonWeekly();
}

function updateCardRole(cardId, roleId) {
  var card = findCard(cardId) || findNonWeeklyCard(cardId);
  if (!card) return;
  var roles = (data && data.roles) || [];
  var role = roles.find(function(r) { return r.id === roleId; });
  if (role) {
    card.role = role.id;
    card.roleLabel = role.label;
  }
  save();
  render();
  renderNonWeekly();
  // Update panel header icon color
  var iconEl = document.getElementById("panelIcon");
  if (iconEl) iconEl.className = 'panel-header-icon ' + card.role;
}

function getRoleColorClass(roleId) {
  var roles = (data && data.roles) || [];
  var role = roles.find(function(r) { return r.id === roleId; });
  if (role && role.color) {
    // Check if color is a built-in CSS class
    var validClasses = ['admin', 'user', 'volunteer', 'supplier', 'custom0', 'custom1', 'custom2', 'custom3'];
    if (validClasses.indexOf(role.color) >= 0) return role.color;
  }
  // Fallback: check if roleId itself is a valid class
  var builtIn = ['admin', 'user', 'volunteer', 'supplier'];
  if (builtIn.indexOf(roleId) >= 0) return roleId;
  return 'custom0';
}

// ============================
// DELETE CARD
// ============================
function deleteCurrentCard() {
  if (!selectedCardId) return;
  var card = findCard(selectedCardId) || findNonWeeklyCard(selectedCardId);
  if (!card) return;
  if (!confirm("确定要删除「" + card.title + "」吗？")) return;

  // Try removing from phases
  var loc = findCardLocation(selectedCardId);
  if (loc) {
    loc.row.cards.splice(loc.cardIdx, 1);
  } else {
    // Try non-weekly
    var nwTasks = data.nonWeeklyTasks || [];
    for (var i = 0; i < nwTasks.length; i++) {
      if (nwTasks[i].id === selectedCardId) {
        nwTasks.splice(i, 1);
        break;
      }
    }
  }

  closePanel();
  save();
  render();
  renderNonWeekly();
  showToast("已删除「" + card.title + "」");
}

// ============================
function renderLegend() {
  var container = document.getElementById('roleBar');
  if (!container || !data) return;
  var roles = data.roles || [];
  var html = '';

  roles.forEach(function(r) {
    var scheme = getColorScheme(r.color || r.id);
    html += '<div class="role-chip" style="background:' + scheme.bg + ';border-color:' + scheme.border + ';" onclick="openRolePopover(event, \'' + r.id + '\')">'
         + '<div class="role-dot" style="background:' + scheme.dot + ';"></div>'
         + '<span>' + escapeHtml(r.label) + '</span>'
         + '<button class="role-remove" onclick="event.stopPropagation(); removeRole(\'' + r.id + '\')">x</button>'
         + '</div>';
  });

  html += '<div class="role-chip-add" onclick="openRolePopover(event, null)">+ 添加角色</div>';
  container.innerHTML = html;
}

function openRolePopover(e, roleId) {
  var existing = roleId ? (data.roles || []).find(function(r) { return r.id === roleId; }) : null;
  var rect = e.currentTarget.getBoundingClientRect();

  var popoverContainer = document.getElementById('rolePopoverContainer');
  var currentColor = existing ? (existing.color || existing.id) : 'custom0';

  var html = '<div class="role-popover-overlay" onclick="closeRolePopover()"></div>'
           + '<div class="role-popover" style="top:' + (rect.bottom + 8) + 'px;left:' + Math.max(8, rect.left - 60) + 'px;">'
           + '<div class="role-popover-title">' + (existing ? '编辑角色' : '添加角色') + '</div>'
           + '<div class="role-popover-field">'
           + '<label>名称</label>'
           + '<input type="text" id="rolePopoverName" value="' + (existing ? escapeHtml(existing.label) : '') + '" placeholder="如：客服、仓库...">'
           + '</div>'
           + '<div class="role-popover-field">'
           + '<label>配色</label>'
           + '<div class="color-picker-grid">';

  COLOR_SCHEMES.forEach(function(scheme) {
    var selected = scheme.id === currentColor;
    html += '<div class="color-swatch ' + (selected ? 'selected' : '') + '" style="background:' + scheme.bg + ';border-color:' + (selected ? scheme.dot : 'transparent') + ';" '
         + 'onclick="selectRoleColor(\'' + scheme.id + '\')" data-color-id="' + scheme.id + '">'
         + '<div class="role-dot" style="background:' + scheme.dot + ';width:16px;height:16px;border-radius:50%;"></div>'
         + '</div>';
  });

  html += '</div></div>'
       + '<input type="hidden" id="rolePopoverColor" value="' + currentColor + '">'
       + '<input type="hidden" id="rolePopoverEditId" value="' + (roleId || '') + '">'
       + '<div class="role-popover-actions">';

  html += '<button class="btn primary" onclick="saveRolePopover()" style="flex:1">' + (existing ? '保存' : '添加') + '</button>'
       + '<button class="btn" onclick="closeRolePopover()">取消</button>'
       + '</div></div>';

  popoverContainer.innerHTML = html;

  // Focus input
  setTimeout(function() {
    var input = document.getElementById('rolePopoverName');
    if (input) input.focus();
  }, 50);
}

function selectRoleColor(colorId) {
  document.getElementById('rolePopoverColor').value = colorId;
  var swatches = document.querySelectorAll('.color-swatch');
  swatches.forEach(function(s) {
    var isSelected = s.dataset.colorId === colorId;
    s.classList.toggle('selected', isSelected);
    var scheme = getColorScheme(s.dataset.colorId);
    s.style.borderColor = isSelected ? scheme.dot : 'transparent';
  });
}

function saveRolePopover() {
  var name = document.getElementById('rolePopoverName').value.trim();
  if (!name) { showToast("请输入角色名称"); return; }

  var colorId = document.getElementById('rolePopoverColor').value;
  var editId = document.getElementById('rolePopoverEditId').value;

  if (!data.roles) data.roles = [];

  if (editId) {
    // Edit existing
    var role = data.roles.find(function(r) { return r.id === editId; });
    if (role) {
      role.label = name;
      role.color = colorId;
      // Update all cards that use this role
      updateAllCardsWithRole(editId, name);
    }
  } else {
    // Add new
    var id = 'role-' + Date.now();
    data.roles.push({ id: id, label: name, color: colorId });
  }

  save();
  closeRolePopover();
  renderLegend();
  render();
  renderNonWeekly();
  // Re-render panel if open
  if (selectedCardId) {
    var card = findCard(selectedCardId) || findNonWeeklyCard(selectedCardId);
    if (card) renderPanelBody(card);
  }
  showToast(editId ? "已更新角色" : "已添加角色「" + name + "」");
}

function updateAllCardsWithRole(roleId, newLabel) {
  // Update roleLabel on all cards using this role
  if (data.phases) {
    data.phases.forEach(function(phase) {
      phase.rows.forEach(function(row) {
        (row.cards || []).forEach(function(card) {
          if (card.role === roleId) card.roleLabel = newLabel;
        });
      });
    });
  }
  (data.nonWeeklyTasks || []).forEach(function(task) {
    if (task.role === roleId) task.roleLabel = newLabel;
  });
}

function closeRolePopover() {
  var container = document.getElementById('rolePopoverContainer');
  if (container) container.innerHTML = '';
}

function removeRole(roleId) {
  if (!data.roles) return;
  var role = data.roles.find(function(r) { return r.id === roleId; });
  if (!role) return;
  if (!confirm("确定要删除角色「" + role.label + "」吗？使用该角色的卡片将变为团长。")) return;

  // Remove role
  data.roles = data.roles.filter(function(r) { return r.id !== roleId; });

  // Reassign cards with this role to admin
  var fallback = data.roles[0] || { id: 'admin', label: '团长' };
  if (data.phases) {
    data.phases.forEach(function(phase) {
      phase.rows.forEach(function(row) {
        (row.cards || []).forEach(function(card) {
          if (card.role === roleId) {
            card.role = fallback.id;
            card.roleLabel = fallback.label;
          }
        });
      });
    });
  }
  (data.nonWeeklyTasks || []).forEach(function(task) {
    if (task.role === roleId) {
      task.role = fallback.id;
      task.roleLabel = fallback.label;
    }
  });

  save();
  renderLegend();
  render();
  renderNonWeekly();
  showToast("已删除角色「" + role.label + "」");
}

// ============================
// DRAG AND DROP
// ============================
var dropTargetInfo = null;

function onDragStart(e, phaseId, rowIdx, cardId) {
  dragSourceInfo = { phaseId: phaseId, rowIdx: rowIdx, cardId: cardId };
  setTimeout(function() { e.target.classList.add('dragging'); }, 0);
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', '');
}

function onDragEnd(e) {
  e.target.classList.remove('dragging');
  clearPlaceholder();
  dragSourceInfo = null;
  dropTargetInfo = null;
  // Remove all drag-over classes
  document.querySelectorAll('.day-drop-zone.drag-over').forEach(function(el) {
    el.classList.remove('drag-over');
  });
}

function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  if (!dragSourceInfo) return;

  var zone = e.currentTarget;
  zone.classList.add('drag-over');

  var phaseId = zone.dataset.phase;
  var rowIdx = parseInt(zone.dataset.row);
  var colIdx = parseInt(zone.dataset.col);

  dropTargetInfo = { phaseId: phaseId, rowIdx: rowIdx, colIdx: colIdx };
}

function onDragLeave(e) {
  if (!e.currentTarget.contains(e.relatedTarget)) {
    e.currentTarget.classList.remove('drag-over');
  }
}

function clearPlaceholder() {
  document.querySelectorAll('.drop-placeholder').forEach(function(el) { el.remove(); });
}

function onGridDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  if (!dragSourceInfo) return;

  var gridEl = e.currentTarget;
  var gridRect = gridEl.getBoundingClientRect();
  var colWidth = gridRect.width / 7;
  var mouseRelX = e.clientX - gridRect.left;
  var colIdx = Math.floor(mouseRelX / colWidth);
  if (colIdx < 0) colIdx = 0;
  if (colIdx > 6) colIdx = 6;

  var phaseId = gridEl.dataset.phase;
  var rowIdx = parseInt(gridEl.dataset.row);
  dropTargetInfo = { phaseId: phaseId, rowIdx: rowIdx, colIdx: colIdx };
}

function onGridDrop(e) {
  e.preventDefault();
  if (!dragSourceInfo || !dropTargetInfo) return;

  var tgtPhaseId = dropTargetInfo.phaseId;
  var tgtRowIdx = dropTargetInfo.rowIdx;
  var tgtColIdx = dropTargetInfo.colIdx;

  var srcPhase = data.phases.find(function(p) { return p.id === dragSourceInfo.phaseId; });
  var srcRow = srcPhase.rows[dragSourceInfo.rowIdx];
  var srcCards = srcRow.cards || [];
  var srcIdx = -1;
  for (var i = 0; i < srcCards.length; i++) {
    if (srcCards[i].id === dragSourceInfo.cardId) { srcIdx = i; break; }
  }
  if (srcIdx === -1) return;

  var card = srcCards.splice(srcIdx, 1)[0];
  card.colIdx = tgtColIdx;
  if (card.colIdx + card.spanDays > 7) {
    card.spanDays = 7 - card.colIdx;
  }

  var tgtPhase = data.phases.find(function(p) { return p.id === tgtPhaseId; });
  var tgtRow = tgtPhase.rows[tgtRowIdx];
  if (!tgtRow.cards) tgtRow.cards = [];
  tgtRow.cards.push(card);

  dragSourceInfo = null;
  dropTargetInfo = null;
  save(); render(); renderNonWeekly();
  showToast("已移动「" + card.title + "」");
}

function onDrop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  clearPlaceholder();
  if (!dragSourceInfo) return;

  var tgtPhaseId = e.currentTarget.dataset.phase;
  var tgtRowIdx = parseInt(e.currentTarget.dataset.row);
  var tgtColIdx = parseInt(e.currentTarget.dataset.col);

  // Find source card and remove it
  var srcPhase = data.phases.find(function(p) { return p.id === dragSourceInfo.phaseId; });
  var srcRow = srcPhase.rows[dragSourceInfo.rowIdx];
  var srcCards = srcRow.cards || [];
  var srcIdx = -1;
  for (var i = 0; i < srcCards.length; i++) {
    if (srcCards[i].id === dragSourceInfo.cardId) { srcIdx = i; break; }
  }
  if (srcIdx === -1) return;

  var card = srcCards.splice(srcIdx, 1)[0];

  // Update card column position, keep spanDays
  card.colIdx = tgtColIdx;
  // Clamp spanDays so card does not go past column 7
  if (card.colIdx + card.spanDays > 7) {
    card.spanDays = 7 - card.colIdx;
  }

  // Insert into target row
  var tgtPhase = data.phases.find(function(p) { return p.id === tgtPhaseId; });
  var tgtRow = tgtPhase.rows[tgtRowIdx];
  if (!tgtRow.cards) tgtRow.cards = [];
  tgtRow.cards.push(card);

  dragSourceInfo = null;
  dropTargetInfo = null;
  save(); render(); renderNonWeekly();
  showToast("已移动「" + card.title + "」");
}

// ============================
// RESIZE
// ============================
function onResizeStart(e, cardId, phaseId, rowIdx) {
  e.preventDefault();
  e.stopPropagation();

  var card = findCard(cardId);
  if (!card) return;

  // Find the phase grid element to compute column boundaries
  var gridEl = e.target.closest('.phase-grid');
  if (!gridEl) return;

  resizeState = {
    cardId: cardId,
    phaseId: phaseId,
    rowIdx: rowIdx,
    startX: e.clientX,
    startSpan: card.spanDays || 1,
    startColIdx: card.colIdx || 0,
    gridEl: gridEl
  };

  // Add resizing class to card
  var cardEl = e.target.closest('.activity');
  if (cardEl) cardEl.classList.add('resizing');

  document.addEventListener('mousemove', onResizeMove);
  document.addEventListener('mouseup', onResizeEnd);
}

function onResizeMove(e) {
  if (!resizeState) return;

  var gridEl = resizeState.gridEl;
  var gridRect = gridEl.getBoundingClientRect();
  var gridWidth = gridRect.width;
  var colWidth = gridWidth / 7;

  // Calculate which column the mouse is over (relative to grid left)
  var mouseRelX = e.clientX - gridRect.left;
  var mouseCol = Math.floor(mouseRelX / colWidth);

  // New span = mouseCol - startColIdx + 1, minimum 1, max 7-startColIdx
  var newSpan = mouseCol - resizeState.startColIdx + 1;
  if (newSpan < 1) newSpan = 1;
  if (newSpan > 7 - resizeState.startColIdx) newSpan = 7 - resizeState.startColIdx;

  // Update card element width in real-time
  var cardEl = gridEl.querySelector('[data-card-id="' + resizeState.cardId + '"]');
  if (cardEl) {
    cardEl.style.gridColumn = (resizeState.startColIdx + 1) + ' / span ' + newSpan;
  }

  resizeState.currentSpan = newSpan;
}

function onResizeEnd(e) {
  document.removeEventListener('mousemove', onResizeMove);
  document.removeEventListener('mouseup', onResizeEnd);

  if (!resizeState) return;

  var newSpan = resizeState.currentSpan || resizeState.startSpan;
  var card = findCard(resizeState.cardId);
  if (card && newSpan !== card.spanDays) {
    card.spanDays = newSpan;
    save();
  }

  // Remove resizing class
  if (resizeState.gridEl) {
    var cardEl = resizeState.gridEl.querySelector('[data-card-id="' + resizeState.cardId + '"]');
    if (cardEl) cardEl.classList.remove('resizing');
  }

  resizeState = null;
  render();
  renderNonWeekly();
}

// ============================
// IMPORT / EXPORT
// ============================
function exportData() {
  var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'tuangou-requirements-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast("已导出 JSON 文件");
}

function importData(event) {
  var file = event.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      data = migrateData(JSON.parse(e.target.result));
      save(); render(); renderNonWeekly();
      showToast("已导入数据");
    } catch(err) {
      showToast("导入失败：文件格式错误");
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function resetData() {
  if (!confirm("确定要重置所有数据？这将清除所有编辑内容，且所有协作者都会受到影响。")) return;
  data = JSON.parse(JSON.stringify(DEFAULT_DATA));
  save(); render(); renderNonWeekly(); closePanel();
  showToast("已重置为默认数据");
}

// ============================
// UTILS
// ============================
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
  el.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = this.scrollHeight + 'px';
  });
}

function showToast(msg) {
  var toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.classList.add("show");
  setTimeout(function() { toast.classList.remove("show"); }, 2000);
}

document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closePanel(); });

// Start
initFirebase();
</script>
